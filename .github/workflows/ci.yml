name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
      SUPABASE_SECRET_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.ci-secret-placeholder
      ADMIN_SECRET: ci-placeholder
      ADMIN_EMAILS: ci@placeholder.com
      TOSS_SECRET_KEY: ci-placeholder

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npx turbo run lint

      - name: Build all apps
        run: npx turbo run build --force

      - name: Summary
        if: success()
        run: echo "### Build Result" >> $GITHUB_STEP_SUMMARY && echo "✅ Lint passed, 3 apps built successfully" >> $GITHUB_STEP_SUMMARY

      - name: Summary (failure)
        if: failure()
        run: echo "### Build Result" >> $GITHUB_STEP_SUMMARY && echo "❌ CI failed — check the logs" >> $GITHUB_STEP_SUMMARY
